<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasser Mekhnach | Photographer</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="new pfp.png">

    <style>
        /* Base Minimalist Styling - Matched to Reference Image */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            color: #ffffff; 
            background-color: #000000;
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar Navigation */
        aside { 
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            padding: 60px 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #000000;
            z-index: 100;
        }
        
        .branding h1 { 
            font-family: 'Playfair Display', serif;
            font-size: 22px; 
            font-weight: 700; 
            margin: 0 0 4px 0; 
        }
        .branding p { 
            font-size: 13px; 
            font-weight: 400; 
            text-transform: uppercase; 
            color: #a0a0a0; 
            margin: 0; 
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 60px;
            flex-grow: 1;
        }
        nav a { 
            text-decoration: none; 
            color: #888888; 
            font-size: 14px; 
            font-weight: 700;
            transition: color 0.3s ease; 
            cursor: pointer; 
        }
        nav a:hover, nav a.active { 
            color: #ffffff; 
        }

        .sidebar-footer {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            line-height: 1.6;
        }

        /* Main Content Area */
        main { 
            margin-left: 280px; 
            padding: 40px 40px 60px 40px; /* Adjusted padding to let images sit closer to the top */
            width: calc(100% - 280px);
            box-sizing: border-box;
        }

        /* Gallery Sections */
        .collection { display: none; }
        #home { display: block; }
        
        .section-title { 
            font-family: 'Playfair Display', serif;
            display: none; /* Hidden to match the reference image's clean look */
        }

        /* Home Page Styling adapted to new layout */
        .home-content {
            width: 100%; /* Removed max-width restriction so images stretch fully */
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 30px;
            filter: grayscale(100%); /* Adds a nice touch for the stark theme */
        }
        .home-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .home-content p {
            font-size: 14px;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 60px; /* Extra breathing room before the massive photos */
            max-width: 500px; /* Keeps text readable while images expand */
        }

        /* 2-Column Grid matching the screenshot */
        .grid { 
            column-count: 2;
            column-gap: 30px; /* Tighter gap to maximize image size */
        }

        .grid-item { 
            margin-bottom: 30px;
            break-inside: avoid;
            display: flex; 
            cursor: pointer;
            position: relative;
        }
        .grid-item img { 
            width: 100%; 
            height: auto; 
            display: block;
            transition: opacity 0.3s ease; 
        }
        .grid-item:hover img { 
            opacity: 0.8; 
        }

        /* Collection Covers on Home Page */
        .home-covers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px; /* Tighter gap */
        }
        .cover-card {
            cursor: pointer;
            position: relative;
        }
        .cover-card img {
            width: 100%;
            aspect-ratio: 4/5;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }
        .cover-card:hover img { opacity: 0.8; }
        .cover-title {
            margin-top: 15px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 0.5px;
        }

        /* Lightbox Styles */
        .lightbox {
            display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.98); 
            flex-direction: column; justify-content: center; align-items: center; 
            opacity: 0; transition: opacity 0.3s ease;
        }
        .lightbox.show { display: flex; opacity: 1; }
        .lightbox-content { max-width: 98%; max-height: 95vh; object-fit: contain; } /* Increased to take up almost the entire screen */
        .lightbox-caption { margin-top: 1.5rem; color: #888; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
        .lightbox-close { position: absolute; top: 30px; right: 40px; color: #fff; font-size: 40px; cursor: pointer; transition: color 0.3s; }
        .lightbox-close:hover { color: #888; }
        
        .lightbox-nav {
            position: absolute; top: 50%; transform: translateY(-50%); color: #fff; font-size: 40px; 
            cursor: pointer; padding: 20px; transition: color 0.3s; user-select: none; z-index: 1000;
        }
        .lightbox-nav:hover { color: #888; }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }

        /* Mobile Responsiveness */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            aside { 
                position: relative; width: 100%; height: auto; padding: 30px 20px; 
                border-bottom: 1px solid #222; z-index: 10;
            }
            nav { margin-top: 30px; flex-direction: row; gap: 20px; flex-wrap: wrap; }
            main { margin-left: 0; width: 100%; padding: 30px 20px; }
            .grid { column-count: 1; }
            .home-covers { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <!-- Lightbox UI Elements -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <span class="lightbox-close" onclick="closeLightbox(event)">&times;</span>
        <span class="lightbox-nav lightbox-prev" onclick="changeLightboxImage(-1, event)">&#10094;</span>
        <img id="lightbox-img" class="lightbox-content">
        <span class="lightbox-nav lightbox-next" onclick="changeLightboxImage(1, event)">&#10095;</span>
        <div id="lightbox-caption" class="lightbox-caption"></div>
    </div>

    <!-- JavaScript -->
    <script>
        function showSection(sectionId) {
            // Hide all sections
            document.querySelectorAll('.collection').forEach(section => {
                section.style.display = 'none';
            });

            // Show target section
            document.getElementById(sectionId).style.display = 'block';
            
            // Update active state in sidebar navigation
            document.querySelectorAll('#nav-menu a').forEach(link => {
                link.classList.remove('active');
                if(link.getAttribute('data-target') === sectionId) {
                    link.classList.add('active');
                }
            });

            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- Lightbox Functions ---
        let currentImages = [];
        let currentIndex = 0;

        function openLightbox(imgSrc, dateText) {
            const lightbox = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = imgSrc;
            document.getElementById('lightbox-caption').textContent = dateText || 'Date Unknown';
            
            // Build gallery array for next/prev using any image that has data-date
            const allImages = Array.from(document.querySelectorAll('img[data-date]'));
            const clickedImg = allImages.find(img => img.src === imgSrc || imgSrc.endsWith(img.getAttribute('src')));
            
            if (clickedImg) {
                // Find all images within the current viewing section (home, quebec, or ontario)
                currentImages = Array.from(clickedImg.closest('.collection').querySelectorAll('img[data-date]'));
                currentIndex = currentImages.indexOf(clickedImg);
            } else {
                currentImages = [];
            }

            lightbox.classList.add('show');
            document.body.style.overflow = 'hidden'; 
        }

        function changeLightboxImage(direction, event) {
            if (event) event.stopPropagation(); 
            if (currentImages.length === 0) return;

            currentIndex += direction;
            
            // Loop back
            if (currentIndex < 0) currentIndex = currentImages.length - 1;
            else if (currentIndex >= currentImages.length) currentIndex = 0;

            const newImg = currentImages[currentIndex];
            document.getElementById('lightbox-img').src = newImg.src;
            document.getElementById('lightbox-caption').textContent = newImg.getAttribute('data-date') || 'Date Unknown';
        }

        function closeLightbox(e) {
            if (e.target.id === 'lightbox' || e.target.classList.contains('lightbox-close')) {
                document.getElementById('lightbox').classList.remove('show');
                document.body.style.overflow = 'auto'; 
            }
        }

        // Keyboard Support
        document.addEventListener('keydown', function(event) {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('show')) return;
            
            if (event.key === 'ArrowLeft') changeLightboxImage(-1, null);
            else if (event.key === 'ArrowRight') changeLightboxImage(1, null);
            else if (event.key === 'Escape') closeLightbox({ target: lightbox });
        });
    </script>
